// Convert bracketSlots state into array of fixture objects (same shape as old koFixtures)
function getBracketFx(state){
  const slots=state.bracketSlots||{};
  return BRACKET
    .filter(b=>slots[b.id]&&(slots[b.id].h||slots[b.id].a))
    .map(b=>({id:b.id,round:b.round,h:slots[b.id].h||"TBD",a:slots[b.id].a||"TBD"}));
}
// Only fixtures where BOTH teams are known — these are predictable
function getFullBracketFx(state){
  const slots=state.bracketSlots||{};
  return BRACKET
    .filter(b=>slots[b.id]&&slots[b.id].h&&slots[b.id].a)
    .map(b=>({id:b.id,round:b.round,h:slots[b.id].h,a:slots[b.id].a}));
}

function calcScores(state){
  const all=[...GS.map(f=>({...f,round:`gs${f.md}`})),...getFullBracketFx(state)];
  const sc={};
  PLAYERS.forEach(p=>{sc[p.id]={total:0,gs:0,gs1:0,gs2:0,gs3:0,r32:0,r16:0,qf:0,sf:0,final:0};});
  all.forEach(f=>{
    const res=state.results[f.id];if(!res)return;
    const pts=POINTS[f.round]||0;
    PLAYERS.forEach(p=>{
      const pred=state.predictions[`${p.id}_${f.id}`];
      if(pred&&pred===res.r){
        sc[p.id][f.round]=(sc[p.id][f.round]||0)+pts;sc[p.id].total+=pts;
        if(f.round==="final"){const fs=state.finalScores[p.id];if(fs&&fs.home===res.hs&&fs.away===res.as){sc[p.id].final+=POINTS.bonus;sc[p.id].total+=POINTS.bonus;}}
      }
    });
  });
  PLAYERS.forEach(p=>{sc[p.id].gs=sc[p.id].gs1+sc[p.id].gs2+sc[p.id].gs3;});
  return sc;
}

  async function save(next){
    setState(next); // optimistic — instant UI update
    setSaving(true);
    if(JSONBIN_ID==="PLACEHOLDER"){setSaving(false);return;}
    try{
      const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},body:JSON.stringify(next)});
      const d=await r.json();
      if(d.message)toast2("⚠️ Save error: "+d.message);
    }catch(e){toast2("⚠️ "+e.message);}
    setSaving(false);
  }
  // Fetch the freshest bin, apply ONE change to it, then write back.
  // This stops a save based on a stale snapshot from wiping changes
  // other people made after this device last loaded.
  // mutate(fresh) must return the next state object.
  // optimistic(state) is an optional instant local preview before the network round-trip.
  async function mergeSave(mutate,optimistic){
    if(!state)return;
    if(optimistic)setState(optimistic(state));
    setSaving(true);
    if(JSONBIN_ID==="PLACEHOLDER"){setState(mutate(state));setSaving(false);return;}
    try{
      // 1. re-read the live bin so we have everyone's latest
      const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{"X-Master-Key":JSONBIN_KEY}});
      const d=await r.json();
      if(d.message){toast2("⚠️ Save error: "+d.message);setSaving(false);return;}
      const fresh=d.record||state;
      // 2. apply just this one change on top of the fresh copy
      const next=mutate(fresh);
      // 3. write the merged result back
      const w=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},body:JSON.stringify(next)});
      const wd=await w.json();
      if(wd.message){toast2("⚠️ Save error: "+wd.message);setSaving(false);return;}
      setState(next); // local state now matches the bin exactly
    }catch(e){toast2("⚠️ "+e.message);}
    setSaving(false);
  }

  async function cascadeWinner(matchId, resultR){
    if(!state)return;
    const bm=BRACKET.find(b=>b.id===matchId);
    if(!bm||!bm.nextMatch)return;
    await mergeSave(
      fresh=>{
        // Read slot from fresh bin — avoids stale closure bug
        const slot=(fresh.bracketSlots||{})[matchId]||{};
        const winner=resultR==="H"?slot.h:resultR==="A"?slot.a:null;
        if(!winner||winner==="TBD")return fresh; // nothing to cascade
        const s={...fresh.bracketSlots};
        s[bm.nextMatch]={...(s[bm.nextMatch]||{}),[bm.nextSide]:winner};
        return {...fresh,bracketSlots:s};
      },
      cur=>{
        const slot=(cur.bracketSlots||{})[matchId]||{};
        const winner=resultR==="H"?slot.h:resultR==="A"?slot.a:null;
        if(!winner||winner==="TBD")return cur;
        const s={...cur.bracketSlots};
        s[bm.nextMatch]={...(s[bm.nextMatch]||{}),[bm.nextSide]:winner};
        return {...cur,bracketSlots:s};
      }
    );
  }

        const diff=new Date(deadline).getTime()-Date.now();

        setExp(false);
        const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);

      }

          <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,rgba(26,58,143,.7),rgba(3,105,161,.6))"}}/>

                <div>{res?(<div className="bc" style={{fontWeight:900,fontSize:13,letterSpacing:1.5,background:T.grnDim,color:T.grn,border:`1px solid rgba(52,211,153,.3)`,borderRadius:8,padding:"4px 12px"}}>{res.r==="H"?"1":res.r==="D"?"X":"2"}{res.hs!==undefined?` · ${res.hs}–${res.as}`:""}</div>):(<div className="of" style={{fontSize:11,color:T.mu,fontWeight:700}}>vs</div>)}</div>

              <div style={{padding:"12px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                {PLAYERS.map((p,pi)=>{
                  const pred=state.predictions[`${p.id}_${f.id}`],isMe=player?.id===p.id;

  function Admin(){
    const gsR=isGS(activeRound);
    const viewFx=gsR?GS.filter(f=>f.g===aGrp&&`gs${f.md}`===activeRound).map(f=>({...f,round:`gs${f.md}`})):getFullBracketFx(state).filter(f=>f.round===activeRound);
    const setD=(fxId,key,val)=>setDraft(d=>({...d,[fxId]:{...d[fxId],[key]:val}}));
    async function subRes(fx){
      const d=draft[fx.id]||{};const r=d.hasOwnProperty("r")?d.r:state.results[fx.id]?.r;
      if(r===undefined){toast2("Select result first");return;}
      const hs=d.hs!==undefined?Number(d.hs):state.results[fx.id]?.hs;
      const as_=d.as!==undefined?Number(d.as):state.results[fx.id]?.as;
      await saveRes(fx.id,r??null,hs,as_);
    }
    return(
      <div>
        <div style={{borderRadius:20,padding:"16px 18px",marginBottom:16,background:"linear-gradient(135deg,#0369a1,#0284c7)",border:"none",boxShadow:"0 6px 24px rgba(3,105,161,.25)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",inset:0,backgroundImage:"url('action.jpg')",backgroundSize:"cover",backgroundPosition:"center",opacity:.22,pointerEvents:"none"}}/>
          <div className="bc" style={{color:T.tx,fontWeight:900,fontSize:22,letterSpacing:1}}>⚙️ Admin Panel</div>
          <div className="of" style={{color:"rgba(56,189,248,.7)",fontSize:12,marginTop:2}}>Shakil's control room</div>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:16,background:"rgba(255,255,255,.04)",borderRadius:14,padding:5,border:`1px solid ${T.bd}`}}>
          {["results","progress","locks","fixtures","pins"].map(t=>(
            <button key={t} className="btn of" onClick={()=>{setAdminTab(t);if(t==="fixtures"&&isGS(activeRound))setActiveRound("r32");}} style={{flex:1,background:adminTab===t?T.cy:"transparent",color:adminTab===t?"#07090f":T.mu,border:"none",borderRadius:10,padding:"8px 4px",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:.5,boxShadow:adminTab===t?`0 0 16px ${T.cyGlow}`:"none"}}>{t}</button>
          ))}
        </div>
        {adminTab==="results"&&(
          <div>
            <RTabs active={activeRound} onSelect={setActiveRound} col={T.cy}/>
            {gsR&&(
              <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4,marginTop:10}}>
                {GROUPS.map(g=>{const on=aGrp===g;return<button key={g} className="pill btn" onClick={()=>setAGrp(g)} style={{flexShrink:0,minWidth:36,background:on?T.gold:"rgba(255,255,255,.05)",color:on?"#fff":T.mu,border:on?`1px solid ${T.gold}`:`1px solid ${T.bd}`}}>{g}</button>;})}
              </div>
            )}
            <div style={{height:10}}/>
            {viewFx.map(fx=>{
              const d=draft[fx.id]||{},saved=state.results[fx.id],r=d.hasOwnProperty("r")?d.r:saved?.r;
              return(
                <div key={fx.id} className="fx">
                  <div className="of" style={{fontSize:14,fontWeight:800,color:T.tx,textAlign:"center",marginBottom:14}}>{flag(fx.h)} {fx.h} <span style={{color:T.mu}}>vs</span> {fx.a} {flag(fx.a)}</div>
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    {[["H",fx.h.split(" ")[0]+" Win"],...(isGS(fx.round)?[["D","Draw"]]:[]),["A",fx.a.split(" ")[0]+" Win"]].map(([v,label])=>(
                      <button key={v} className="btn of" onClick={()=>setD(fx.id,"r",r===v?null:v)} style={{flex:1,borderRadius:10,padding:"9px 4px",fontSize:11,fontWeight:800,background:r===v?T.cy:"rgba(255,255,255,.05)",color:r===v?"#07090f":T.mu,border:r===v?`1px solid ${T.cy}`:`1px solid ${T.bd}`,boxShadow:r===v?`0 0 14px ${T.cyGlow}`:"none"}}>{label}{r===v?" ✕":""}</button>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center",marginBottom:10}}>
                    <input type="number" min="0" max="20" placeholder="H" defaultValue={saved?.hs??""} onChange={e=>setD(fx.id,"hs",e.target.value)} className="inp" style={{width:62,textAlign:"center",fontSize:22,fontWeight:900,padding:"6px"}}/>
                    <span className="bc" style={{color:T.mu,fontWeight:900,fontSize:20}}>–</span>
                    <input type="number" min="0" max="20" placeholder="A" defaultValue={saved?.as??""} onChange={e=>setD(fx.id,"as",e.target.value)} className="inp" style={{width:62,textAlign:"center",fontSize:22,fontWeight:900,padding:"6px"}}/>
                    <span className="of" style={{fontSize:11,color:T.mu}}>optional</span>
                  </div>
                  <button className="bb btn" onClick={()=>subRes(fx)} style={{background:T.cy,color:"#fff",marginBottom:6,boxShadow:`0 4px 16px ${T.cyGlow}`}}>{saved?"Update Result":"Save Result"}</button>
                  {saved&&<button className="bb btn" onClick={()=>saveRes(fx.id,null)} style={{background:T.rDim,color:T.red,border:`1px solid rgba(248,113,113,.3)`}}>✕ Clear Result</button>}
                </div>
              );
            })}
          </div>
        )}
        {adminTab==="progress"&&(()=>{
          // Fixtures for the WHOLE selected round (all groups for GS rounds).
          const roundFx=isGS(activeRound)
            ? GS.filter(f=>`gs${f.md}`===activeRound)
            : getFullBracketFx(state).filter(f=>f.round===activeRound);
          const total=roundFx.length;
          // For each player: how many of this round's fixtures they've predicted.
          // We only check whether the prediction KEY exists — never the pick itself.
          const rows=PLAYERS.map(p=>{
            const done=total===0?0:roundFx.filter(f=>state.predictions[`${p.id}_${f.id}`]!==undefined).length;
            return {p,done,complete:total>0&&done===total};
          }).sort((a,b)=>a.done-b.done); // least-done first, so laggards are at the top
          const allDone=total>0&&rows.every(r=>r.complete);
          return(
            <div>
              <RTabs active={activeRound} onSelect={setActiveRound} col={T.cy}/>
              <div style={{height:12}}/>
              {total===0?(
                <div className="of" style={{textAlign:"center",color:T.mu,padding:24,fontSize:13}}>No fixtures in this round yet</div>
              ):(
                <>
                  <div className="of" style={{textAlign:"center",color:T.mu,fontSize:12,marginBottom:12}}>
                    {ROUNDS.find(r=>r.id===activeRound)?.label} · {total} {total===1?"fixture":"fixtures"} · who still needs to predict
                  </div>
                  {allDone&&(
                    <div className="of" style={{background:T.grnDim,border:"1px solid rgba(52,211,153,.3)",borderRadius:12,padding:"10px 14px",marginBottom:12,fontSize:13,fontWeight:800,color:T.grn,textAlign:"center"}}>✅ Everyone's in for this round</div>
                  )}
                  {rows.map(({p,done,complete})=>{
                    const pct=Math.round(done/total*100);
                    return(
                      <div key={p.id} className="fx" style={{marginBottom:8,padding:"12px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{width:30,height:30,borderRadius:"50%",background:complete?T.grn:T.cy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#07090f",flexShrink:0}}>{p.name.charAt(0)}</div>
                            <span className="of" style={{fontSize:14,fontWeight:700,color:T.tx}}>{p.name}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span className="of" style={{fontSize:13,fontWeight:800,color:complete?T.grn:done===0?T.red:T.mu}}>{done}/{total}</span>
                            <span style={{fontSize:15}}>{complete?"✅":done===0?"⛔":"⏳"}</span>
                          </div>
                        </div>
                        <div style={{height:4,background:"rgba(255,255,255,.06)",borderRadius:2,marginTop:9,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,borderRadius:2,background:complete?T.grn:T.cy,transition:"width .5s ease"}}/>
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          );
        })()}
        {adminTab==="locks"&&(
          <div>
            <div className="of" style={{color:T.mu,fontSize:13,marginBottom:14,textAlign:"center"}}>Lock rounds before kickoff to freeze predictions</div>
            {ROUNDS.map(r=>(
              <div key={r.id} className="fx" style={{marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isGS(r.id)?12:0}}>
                  <div>
                    <div className="of" style={{fontWeight:700,fontSize:14,color:T.tx}}>{r.label}</div>
                    <div className="of" style={{fontSize:11,color:T.mu,marginTop:2}}>{POINTS[r.id]}pt · {state.locks[r.id]?"🔒 Locked":"🟢 Open"}</div>
                  </div>
                  <button className="btn of" onClick={()=>toggleLock(r.id)} style={{borderRadius:10,padding:"9px 16px",fontSize:12,fontWeight:800,background:state.locks[r.id]?T.rDim:T.grnDim,color:state.locks[r.id]?T.red:T.grn,border:`1px solid ${state.locks[r.id]?"rgba(248,113,113,.3)":"rgba(52,211,153,.3)"}`}}>{state.locks[r.id]?"🔓 Unlock":"🔒 Lock"}</button>
                </div>
                {isGS(r.id)&&(
                  <div>
                    <div className="of" style={{fontSize:11,color:T.mu,marginBottom:6,fontWeight:600}}>⏱ Prediction deadline (your local time)</div>
                    <input type="datetime-local" className="inp" style={{fontSize:13,padding:"8px 10px"}} value={state.deadlines?.[r.id]||""} onChange={async e=>{const val=e.target.value||"";await mergeSave(fresh=>({...fresh,deadlines:{...(fresh.deadlines||{}),[r.id]:val}}),cur=>({...cur,deadlines:{...(cur.deadlines||{}),[r.id]:val}}));toast2("Deadline saved ✓");}}/>
                    {state.deadlines?.[r.id]&&<div className="of" style={{fontSize:11,color:T.blue,marginTop:5}}>Set to {state.deadlines[r.id].replace("T"," at ").slice(0,16)}</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
        {adminTab==="fixtures"&&(
          <div>
            {/* Round tabs — KO rounds only */}
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
              {ROUNDS.filter(r=>!isGS(r.id)).map(r=>{
                const on=activeRound===r.id;
                const total=BRACKET.filter(b=>b.round===r.id).length;
                const done=BRACKET.filter(b=>b.round===r.id&&state.bracketSlots?.[b.id]?.h&&state.bracketSlots?.[b.id]?.a).length;
                return(
                  <button key={r.id} className="pill btn" onClick={()=>setActiveRound(r.id)} style={{flexShrink:0,background:on?T.cy:"rgba(15,28,64,.06)",color:on?"#fff":T.mu,border:on?`1px solid ${T.cy}`:`1px solid rgba(15,28,64,.1)`,boxShadow:on?`0 0 16px ${T.cyGlow}`:"none"}}>
                    {r.short} <span style={{opacity:.7,fontSize:10}}>{done}/{total}</span>
                  </button>
                );
              })}
            </div>
            <div className="of" style={{color:T.mu,fontSize:11,marginBottom:14,textAlign:"center"}}>
              Save with one team to mark TBD · players predict once both are set
            </div>
            {BRACKET.filter(bm=>bm.round===activeRound).map(bm=>{
              const slot=state.bracketSlots?.[bm.id]||{};
              const hVal=slot.h||"";const aVal=slot.a||"";
              const bothSet=hVal&&aVal;
              return(
                <div key={bm.id} className="fx" style={{marginBottom:10,borderColor:bothSet?"rgba(52,211,153,.3)":"rgba(15,28,64,.09)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div className="of" style={{fontSize:11,color:T.mu,fontWeight:600}}>{bm.label}</div>
                    <div className="of" style={{fontSize:10,color:bothSet?T.grn:T.mu,fontWeight:700}}>{bothSet?"✅":"⏳"}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:bothSet?10:0}}>
                    <div style={{flex:1}}>
                      <div className="of" style={{fontSize:10,color:T.mu,marginBottom:4,fontWeight:600}}>Home</div>
                      <select className="inp" style={{fontSize:13,padding:"8px 10px"}}
                        value={hVal}
                        onChange={e=>saveBracketSlot(bm.id,"h",e.target.value)}>
                        <option value="">— Select —</option>
                        {ALL_TEAMS.map(t=><option key={t} value={t}>{flag(t)} {t}</option>)}
                      </select>
                    </div>
                    <div className="bc" style={{color:T.mu,fontWeight:900,fontSize:18,flexShrink:0,paddingTop:18}}>vs</div>
                    <div style={{flex:1}}>
                      <div className="of" style={{fontSize:10,color:T.mu,marginBottom:4,fontWeight:600}}>Away</div>
                      <select className="inp" style={{fontSize:13,padding:"8px 10px"}}
                        value={aVal}
                        onChange={e=>saveBracketSlot(bm.id,"a",e.target.value)}>
                        <option value="">— Select —</option>
                        {ALL_TEAMS.map(t=><option key={t} value={t}>{flag(t)} {t}</option>)}
                      </select>
                    </div>
                  </div>
                  {bothSet&&(
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"8px 0",borderTop:"1px solid rgba(15,28,64,.07)"}}>
                      <span style={{fontSize:22}}>{flag(hVal)}</span>
                      <span className="of" style={{fontWeight:800,fontSize:13,color:T.tx}}>{hVal}</span>
                      <span className="of" style={{color:T.mu,fontSize:11,fontWeight:700}}>vs</span>
                      <span className="of" style={{fontWeight:800,fontSize:13,color:T.tx}}>{aVal}</span>
                      <span style={{fontSize:22}}>{flag(aVal)}</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        {adminTab==="pins"&&(
          <div>
            {PLAYERS.map(p=>(
              <div key={p.id} className="fx" style={{marginBottom:8}}>
                <div className="of" style={{fontWeight:700,fontSize:14,color:T.tx,marginBottom:8}}>{p.name}</div>
                {editPin===p.id?(
                  <div style={{display:"flex",gap:8}}>
                    <input value={newPin} onChange={e=>setNewPin(e.target.value)} placeholder="New PIN" maxLength={8} className="inp" style={{flex:1}}/>
                    <button className="btn of" onClick={()=>savePin(p.id,newPin)} style={{borderRadius:10,padding:"0 14px",background:T.cy,color:"#fff",border:"none",fontSize:12,fontWeight:800}}>Save</button>
                    <button className="btn of" onClick={()=>{setEditPin(null);setNewPin("");}} style={{borderRadius:10,padding:"0 12px",background:T.sf2,color:T.mu,border:`1px solid ${T.bd}`,fontSize:16}}>✕</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span className="of" style={{fontSize:12,color:T.mu,letterSpacing:4}}>{"•".repeat(state.pins[p.id]?.length||4)}</span>
                    <button className="btn of" onClick={()=>{setEditPin(p.id);setNewPin(state.pins[p.id]||"");}} style={{borderRadius:10,padding:"6px 14px",fontSize:12,background:T.sf2,color:T.mu,border:`1px solid ${T.bd}`}}>Change</button>
                  </div>
                )}
              </div>
            ))}
            <div className="fx">
              <div className="of" style={{fontWeight:700,fontSize:14,color:T.tx,marginBottom:8}}>Admin Password</div>
              {editPin==="__ap__"?(
                <div style={{display:"flex",gap:8}}>
                  <input value={newPin} onChange={e=>setNewPin(e.target.value)} placeholder="New password" className="inp" style={{flex:1}}/>
                  <button className="btn of" onClick={async()=>{await mergeSave(fresh=>({...fresh,adminPass:newPin}),cur=>({...cur,adminPass:newPin}));setEditPin(null);setNewPin("");toast2("Updated ✓");}} style={{borderRadius:10,padding:"0 14px",background:T.cy,color:"#fff",border:"none",fontSize:12,fontWeight:800}}>Save</button>
                  <button className="btn of" onClick={()=>{setEditPin(null);setNewPin("");}} style={{borderRadius:10,padding:"0 12px",background:T.sf2,color:T.mu,border:`1px solid ${T.bd}`,fontSize:16}}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span className="of" style={{fontSize:12,color:T.mu}}>••••••</span>
                  <button className="btn of" onClick={()=>{setEditPin("__ap__");setNewPin(state.adminPass);}} style={{borderRadius:10,padding:"6px 14px",fontSize:12,background:T.sf2,color:T.mu,border:`1px solid ${T.bd}`}}>Change</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  function Login(){
    if(loginStep==="pick")return(
      <div style={{minHeight:"calc(100vh - 64px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",position:"relative"}}>
        {/* Trophy background */}
        <div style={{position:"fixed",inset:0,zIndex:-1,pointerEvents:"none"}}>
          <div style={{position:"absolute",inset:0,backgroundImage:"url('trophy.jpg')",backgroundSize:"cover",backgroundPosition:"center top",opacity:.18}}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(240,244,255,.6) 0%,rgba(240,244,255,.95) 100%)"}}/>
        </div>
        <div style={{textAlign:"center",marginBottom:36,animation:"fadeUp .6s ease both"}}>
          <div style={{display:"inline-block",background:"#0f1c40",borderRadius:16,padding:"10px 16px",marginBottom:16}}>
            <img src="logo.png" alt="FIFA World Cup 2026" style={{height:80,width:"auto",objectFit:"contain",display:"block"}}/>
          </div>
          <div className="of" style={{color:T.mu,fontSize:13,fontWeight:600}}>Who are you?</div>
        </div>
        <div style={{width:"100%",maxWidth:340,animation:"fadeUp .6s ease .1s both"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {PLAYERS.map((p,i)=>{
              const [bg,bd,ac]=AV[i%AV.length];
              return(
                <button key={p.id} className="btn" onClick={()=>{setSelP(p);setLoginStep("pin");setPinErr("");}} style={{background:"#fff",border:`1.5px solid rgba(15,28,64,.08)`,borderRadius:20,padding:"20px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:12,boxShadow:"0 2px 16px rgba(15,28,64,.08)",transition:"all .2s",animation:`fadeUp .5s ease ${.12+i*.05}s both`}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(15,28,64,.15)";e.currentTarget.style.borderColor=bd;}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 2px 16px rgba(15,28,64,.08)";e.currentTarget.style.borderColor="rgba(15,28,64,.08)";}}>
                  <div style={{width:52,height:52,borderRadius:"50%",background:bg,border:`2px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 14px ${bd}`}}>
                    <span className="bc" style={{fontWeight:900,fontSize:22,color:ac}}>{p.name.charAt(0)}</span>
                  </div>
                  <span className="of" style={{fontSize:14,fontWeight:700,color:T.tx}}>{p.name}</span>
                </button>
              );
            })}
          </div>
          <button className="btn of" onClick={()=>{setSelP({id:"__admin__",name:"Admin"});setLoginStep("pin");}} style={{width:"100%",background:"#fff",border:"1.5px solid rgba(15,28,64,.08)",borderRadius:16,padding:"14px",fontSize:13,color:T.cy,fontWeight:700,letterSpacing:.5,boxShadow:"0 2px 12px rgba(15,28,64,.07)"}}>
            ⚙️ Admin Login
          </button>
          {/* Easter egg */}
          <div style={{textAlign:"center",marginTop:20}}>
            <img src="postbox.jpeg" alt="" style={{width:60,height:60,objectFit:"cover",borderRadius:12,opacity:.5,filter:"saturate(.7)"}}/>
            <div className="of" style={{fontSize:9,color:T.mu,marginTop:4,letterSpacing:1}}>It's coming home 🏴󠁧󠁢󠁥󠁮󠁧󠁿</div>
          </div>
        </div>
      </div>
    );
    const idx=PLAYERS.findIndex(p=>p.id===selP?.id);
    const [bg,bd,ac]=idx>=0?AV[idx%AV.length]:["rgba(3,105,161,.12)","rgba(3,105,161,.4)","#0369a1"];
    return(
      <div style={{maxWidth:340,margin:"0 auto",paddingTop:24,animation:"fadeUp .4s ease both"}}>
        <div style={{background:"#fff",borderRadius:24,padding:"32px 24px",boxShadow:"0 4px 32px rgba(15,28,64,.1)",border:"1px solid rgba(15,28,64,.07)",textAlign:"center",marginBottom:14}}>
          <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto",background:bg,border:`2px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 18px ${bd}`,marginBottom:16}}>
            <span className="bc" style={{fontWeight:900,fontSize:28,color:ac}}>{selP?.id==="__admin__"?"⚙":selP?.name?.charAt(0)||"?"}</span>
          </div>
          <div className="bc" style={{fontWeight:900,fontSize:26,color:T.tx,letterSpacing:1}}>{selP?.name}</div>
          <div className="of" style={{color:T.mu,fontSize:13,marginTop:4,marginBottom:20}}>Enter your PIN</div>
          <input type="password" value={pinIn} onChange={e=>setPinIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="· · · ·" className="inp" style={{textAlign:"center",fontSize:30,letterSpacing:12}}/>
          {pinErr&&(<div className="of" style={{background:T.rDim,border:`1px solid rgba(192,57,43,.25)`,borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:700,color:T.red,marginTop:10,textAlign:"center"}}>{pinErr}</div>)}
        </div>
        <button className="bb btn of" onClick={handleLogin} style={{background:T.blue,color:"#fff",boxShadow:`0 8px 28px ${T.bGlow}`,marginBottom:10,fontWeight:900}}>Sign In →</button>
        <button onClick={()=>{setLoginStep("pick");setPinIn("");setPinErr("");}} className="of" style={{width:"100%",background:"transparent",color:T.mu,border:"none",fontSize:13,cursor:"pointer",padding:"10px"}}>← Back</button>
        <div className="of" style={{background:"#fff",border:`1px solid rgba(15,28,64,.08)`,borderRadius:12,padding:"10px 14px",marginTop:6,fontSize:12,color:T.blue,textAlign:"center",boxShadow:"0 1px 8px rgba(15,28,64,.05)"}}>Default PIN is <strong>1111</strong> — Shakil can reset yours</div>
      </div>
    );
  }

  const navTabs=[
    {id:"leaderboard",icon:"🏆",label:"Standings"},
    {id:"predict",icon:"⚽",label:"Predict"},
    {id:"reveal",icon:"👁",label:"Picks"},
    ...(isAdmin?[{id:"admin",icon:"⚙️",label:"Admin"}]:[]),
    ...(!player&&!isAdmin?[{id:"login",icon:"👤",label:"Sign In"}]:[]),
  ];

  if(loading)return(
    <>
      <style>{CSS}</style>
      <div style={{background:T.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,animation:"reveal 1s ease both"}}>
        <img src="logo.png" alt="FIFA World Cup 2026" style={{height:110,width:"auto",objectFit:"contain",mixBlendMode:"screen",background:"#0f1c40",borderRadius:12,padding:8}}/>
        <div className="of" style={{color:T.mu,fontSize:11,letterSpacing:4,textAlign:"center",textTransform:"uppercase"}}>Loading</div>
      </div>
    </>
  );
  if(!state)return null;

  return(
    <>
      <style>{CSS}</style>
      <div style={{background:T.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:90}}>
        <div style={{background:"rgba(255,255,255,.96)",padding:"10px 18px",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid rgba(15,28,64,.09)",boxShadow:"0 2px 16px rgba(15,28,64,.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:"#0f1c40",borderRadius:10,padding:"4px 8px",display:"inline-flex",alignItems:"center"}}>
                <img src="logo.png" alt="" style={{height:30,width:"auto",objectFit:"contain"}}/>
              </div>
              <div style={{lineHeight:1.1}}>
                <div className="bc" style={{fontWeight:900,fontSize:15,color:"#0f1c40",letterSpacing:1,textTransform:"uppercase"}}>World Cup</div>
                <div className="bc" style={{fontWeight:900,fontSize:15,letterSpacing:1,textTransform:"uppercase"}}>
                  <span style={{color:"#0f1c40"}}>20</span><span style={{color:"#c47d06"}}>26</span>
                </div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {saving&&<span className="of" style={{color:T.mu,fontSize:11}}>saving…</span>}
              {(player||isAdmin)&&(
                <>
                  <div style={{background:"#f0f4ff",border:"1px solid rgba(15,28,64,.1)",borderRadius:100,padding:"5px 13px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 1px 6px rgba(15,28,64,.08)"}}>
                    <span className="of" style={{color:T.txM,fontSize:12,fontWeight:700}}>{isAdmin?"⚙️ Admin":player?.name}</span>
                    {player&&<span className="bc" style={{color:T.gold,fontSize:18,fontWeight:900}}>{scores[player.id]?.total||0}</span>}
                  </div>
                  <button className="btn of" onClick={logout} style={{background:"#f0f4ff",color:T.mu,border:"1px solid rgba(15,28,64,.1)",borderRadius:100,padding:"5px 12px",fontSize:11,fontWeight:700}}>Out</button>
                </>
              )}
            </div>
          </div>
        </div>
        {toast&&(<div className="of" style={{position:"fixed",top:68,left:"50%",transform:"translateX(-50%)",background:"#0f1c40",color:"#fff",border:"none",borderRadius:100,padding:"9px 22px",fontSize:13,fontWeight:700,zIndex:100,whiteSpace:"nowrap",boxShadow:"0 8px 32px rgba(15,28,64,.25)"}}>{toast}</div>)}
        <div style={{padding:"16px 14px"}}>
          {tab==="leaderboard"&&Leaderboard()}
          {tab==="predict"&&Predict()}
          {tab==="reveal"&&Reveal()}
          {tab==="admin"&&isAdmin&&Admin()}
          {tab==="login"&&Login()}
        </div>
        <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:50,background:"rgba(255,255,255,.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",border:"1px solid rgba(15,28,64,.1)",borderRadius:100,display:"flex",padding:"5px",gap:2,boxShadow:"0 8px 40px rgba(15,28,64,.15)"}}>
          {navTabs.map(t=>{const on=tab===t.id;return(
            <button key={t.id} className="np btn" onClick={()=>setTab(t.id)} style={{background:on?T.bDim:"transparent",padding:"8px 16px",minWidth:60}}>
              <div style={{fontSize:20,transition:"filter .2s"}}>{t.icon}</div>
              <span className="of" style={{fontSize:10,fontWeight:700,letterSpacing:.3,color:on?T.blue:T.mu,transition:"color .2s"}}>{t.label}</span>
            </button>
          );})}
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
